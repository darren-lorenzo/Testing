version: '3.8'

services:
  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      SERVER_PORT: 8080
      CLIENT_WEB_PORT: 8081
      DB_HOST: db
      DB_NAME: area_db
      DB_USER: Area-user
      DB_PASSWORD: Area@2025
      DB_PORT: 3306
      DB_DIALECT: mysql
      PORT: 8080
    ports:
      - "8080:8080"

  client_mobile:
    build: ./area_frontend_mobile
    volumes:
      - shared_volume:/shared

  client_web:
    build: ./area_frontend_web
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
    volumes:
      - shared_volume:/shared
    depends_on:
      - client_mobile

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: area_db
      MYSQL_USER: Area-user
      MYSQL_PASSWORD: Area@2025

volumes:
  db-data:
  shared_volume:
